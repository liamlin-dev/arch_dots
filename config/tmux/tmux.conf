#### Keybindings ####
#
# 前綴鍵 (Prefix): C-a
# -------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix # 重新設定 C-a C-a 為發送前綴鍵 (雙擊 C-a)
# reload config: R (Reload)
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Tmux config reloaded!"

# WARN: Do not use Alt(M-) here as it will cause key conflicts with yazi
# -------------------------------------------------------------

# Copy Mode (統一為 Vim 模式)
# -------------------------------------------------------------
bind -T prefix Space copy-mode           # C-a Space: 進入複製模式
bind -T copy-mode-vi v send-key -X begin-selection
bind -T copy-mode-vi C-v send-key -X rectangle-toggle
bind -T copy-mode-vi y send-key -X copy-pipe # copy-selection-and-cancel
bind -T copy-mode-vi MouseDown1Pane send-keys -X clear-selection \; select-pane # 滑鼠點擊可以清空

# Session Management (S=Session, N=New)
# -------------------------------------------------------------
bind S command-prompt "rename-session %%"  # C-a S: 重新命名 Session
bind N command-prompt -p "New Session:" "new-session -s '%%'" # C-a N: 新建 Session

# Window Management (W=Window, J/K 導航, X=Close)
# -------------------------------------------------------------
bind W command-prompt "rename-window %%"   # C-a W: 重新命名 Window
bind n command-prompt -p "New Window:" "new-window -s '%%'" # C-a N: 新建 Session
bind [ previous-window                    # C-a j: 上一個 Window
bind ] next-window                        # C-a k: 下一個 Window
bind '{' swap-window -t -1 \; select-window -t -1 # C-a [: 左移 Window
bind '}' swap-window -t +1 \; select-window -t +1 # C-a ]: 右移 Window
bind X kill-window                        # C-a X: 關閉當前 Window (使用大寫以防誤觸)

# Pane Management (空間分割與調整)
# -------------------------------------------------------------
# Split (V=Vertical, H=Horizontal)
unbind %
bind '\' split-window -h -c "#{pane_current_path}"
unbind '"'
bind - split-window -v -c "#{pane_current_path}"
# Pane Swapping (P=Swap)
bind p run-shell -b "$HOME/.config/tmux/scripts/swap-pane.sh"
# Resize Pane (遵循 Vim 方向鍵 H/J/K/L，但使用 C-Direction 來區分)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# M = Magnify (全螢幕縮放)
bind m resize-pane -Z                     # C-a m: 縮放當前 Pane (Maximize)
# Kill Pane (x=kill)
bind x kill-pane                          # C-a x: 關閉當前 Pane

# Quick Popups / Utilities (F/G/H/M for Tools)
# -------------------------------------------------------------
# F = Floating Shell
bind f run-shell -b "$HOME/.config/tmux/scripts/toggle-term.sh"
# G = Git Utility (lazygit)
bind g display-popup -xC -yC -w 90% -h 90% -b rounded -d '#{pane_current_path}' -E "lazygit" # C-a g: 開啟 lazygit
# T = Top / System Monitor
bind t display-popup -xC -yC -w 90% -h 90% -b rounded -E "btop" # C-a h: 開啟 btop
# E = Explorer
bind e display-popup -xC -yC -w 90% -h 90% -b rounded -d '#{pane_current_path}' -E "yazi" # C-a e: 開啟 yazi

#### Theme ####
source-file ~/.config/tmux/theme.conf

#### Plugins ####
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

#### Settings ####
set -g mouse off
set -g history-limit 100000
set -g mode-keys vi
set -g base-index 1 # start index windwos at 1 not 0
set -g pane-base-index 1
set -sg escape-time 0
set -sa terminal-overrides ',xterm*:Tc'
set -s set-clipboard on # 發送並轉發剪貼簿
# set -sa terminal-overrides ',xterm-256color:RGB'
set -g renumber-windows on
set -g status-position top
# yazi
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM
# restore
set -g @continuum-restore 'on'
set -g @continuum-save-interval '2'

# bootstrap tpm
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
